name: Dagelijkse koers-refresh

# Draait in GitHub's cloud, dus laptop-onafhankelijk.
# 1) ververst live.json met verse koersen
# 2) commit dat naar de repo (historie)
# 3) deployt zelf naar Vercel-productie via de CLI (betrouwbare publieke alias)
#
# Eenmalig nodig: repo-secret VERCEL_TOKEN (Vercel > Account Settings > Tokens).
# De org- en project-ID's zijn identifiers (geen geheim) en staan hieronder.

on:
  schedule:
    # 22:30 UTC = na sluiting Amerikaanse beurs (vangt de koers van die dag).
    - cron: "30 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_U7vQFfuwSF2dqLLeDVLM2P64
  VERCEL_PROJECT_ID: prj_PBJ2EIGFdqXn7S6rIRVx0ZF6GMNw

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Repo ophalen
        uses: actions/checkout@v4

      - name: Python klaarzetten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: yfinance installeren
        run: pip install --quiet yfinance

      - name: Koersen verversen
        run: python refresh_live.py

      - name: Wijziging committen (historie, alleen als er iets veranderde)
        run: |
          git config user.name  "mninvest-bot"
          git config user.email "actions@users.noreply.github.com"
          if git status --porcelain live.json | grep -q .; then
            git add live.json
            git commit -m "chore: dagelijkse koers-refresh ($(date -u +%Y-%m-%d))"
            git push
            echo "live.json bijgewerkt en gepusht."
          else
            echo "Geen wijziging in live.json."
          fi

      - name: Vercel-CLI installeren
        run: npm install --global vercel@latest

      - name: Naar Vercel-productie deployen
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
